<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prime Traders — Redirecting…</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#fff;font-family:system-ui,sans-serif}
    .box{text-align:center}
    .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#00e7a0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#888;font-size:.9rem}
    a{color:#00e7a0}
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Connecting to Prime Traders…</h2>
    <p id="msg">Redirecting to your local environment.</p>
  </div>
  <script>
    (function () {
      // Change this when you deploy to a real domain:
      var LOCAL_URL = "http://localhost:3000/auth/callback";

      var qs = window.location.search;

      if (!qs || qs.indexOf("token") === -1) {
        document.getElementById("msg").innerHTML =
          "No OAuth tokens found. <a href='http://localhost:3000/dashboard'>Go to dashboard</a>";
        return;
      }

      // Redirect to localhost preserving all query params
      window.location.replace(LOCAL_URL + qs);
    })();
  </script>
</body>
</html>
